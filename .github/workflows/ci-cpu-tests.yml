name: CPU Test Inference

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run_tests:
    name: Full Evaluation Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Inference
        run: python tests/test_inference.py

      - name: Run MOF Validation
        run: python tests/test_mof.py 

      - name: Upload All Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-evaluation-artifacts
          path: |
            logs/
            *.pdf
            *.png

data:
  data_path: "./data/Bulk_water_ALMO_karhan/"
  n_snapshots: 10
  n_samples: 125
  n_features: 952
  mode: "train"
  output_type: "donor"
  n_outputs: 2
  start_index: 90000
  end_index: 90020
  random_seed: 123
  valid_size: 0.2
  use_multiprocessing: "True"
  scaler_path: "./models/scaler.pkl"

model:
  model_path: "./models/best_model_donor.pt"
  hidden_sizes: [50, 50]
  output_size: 2
  activation: "Tanh"
  dropout: 0.0

training:
  checkpoint_path: "./models/test_model_donor.pt"
  epochs: 50
  lr: 0.0001
  batch_size: 128
  weight_decay: 0.001

optimization:
  enabled: True
  n_trials: 5
  epochs_per_trial: 5
  search_space:
    num_layers: [2, 4, 6]
    hidden_units:
      min: 50
      max: 400
      step: 50
    learning_rates: [0.01, 0.001, 0.0001]
    batch_sizes: [32, 64, 128, 256]
    activations: ["ReLU", "LeakyReLU", "Tanh"]
